<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポモドーロタイマー（スマホ版）</title>
<style>
  :root {
    --bg:#f3f1ea;--bg2:#ffffff;--surface:#f8f6f1;--surface2:#eeeae0;
    --border:#e5e1d6;--border-hi:#ccc8bc;
    --text:#1c1a17;--text2:#6b6762;--text3:#a09a90;
    --accent-bg:#eff6ff;--accent-text:#1d4ed8;--accent-text2:#3b82f6;
    --red-bg:#fff1f2;--red-text:#9f1239;
    --green-bg:#f0fdf4;--green-text:#166534;
  }
  body.dark{
    --bg:#080c10;--bg2:#0d1117;--surface:#161b22;--surface2:#1c2128;
    --border:#21262d;--border-hi:#30363d;
    --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
    --accent-bg:rgba(0,230,118,.1);--accent-text:#00e676;--accent-text2:#3fb950;
    --red-bg:rgba(248,81,73,.12);--red-text:#f85149;
    --green-bg:rgba(63,185,80,.12);--green-text:#3fb950;
  }
  *{box-sizing:border-box;}
  body{font-family:'DM Sans','Hiragino Sans','Yu Gothic',system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:1.5rem 1rem 3rem;line-height:1.6;transition:background .25s,color .25s;}
  .wrap{max-width:460px;margin:0 auto;}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px;}
  h1{font-size:19px;font-weight:700;margin:0 0 3px;letter-spacing:-.02em;}
  .subtitle{color:var(--text3);font-size:12px;margin:0;}
  #themeToggle{font-family:'DM Mono',ui-monospace,monospace;font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border-hi);background:var(--bg2);color:var(--text2);cursor:pointer;flex-shrink:0;}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem 1.25rem;text-align:center;margin-bottom:1rem;}
  .mode-label{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:.5rem;}
  .time-display{font-family:'DM Mono',ui-monospace,monospace;font-size:52px;font-weight:700;color:var(--red-text);line-height:1;margin:.5rem 0 1rem;}
  .time-display.break{color:var(--green-text);}
  .switch-btn{width:100%;font-family:'DM Mono',ui-monospace,monospace;font-size:15px;font-weight:700;padding:14px;border-radius:10px;border:none;background:#3b82f6;color:#fff;cursor:pointer;margin-bottom:12px;}
  .btn-row{display:flex;gap:8px;}
  .btn-row button{flex:1;font-family:'DM Mono',ui-monospace,monospace;font-size:13px;font-weight:700;padding:12px;border-radius:8px;border:none;cursor:pointer;color:#fff;}
  .btn-start{background:#4caf50;}
  .btn-pause{background:#ff9800;}
  .btn-reset{background:#f44336;}

  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:1rem;}
  .stat-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);padding:4px 0;}
  .stat-row b{color:var(--text);font-family:'DM Mono',ui-monospace,monospace;}

  .settings{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:1rem;}
  .settings label{font-size:12px;color:var(--text3);display:block;margin-bottom:4px;}
  .settings .row{display:flex;gap:10px;margin-bottom:10px;}
  .settings input{width:100%;font-family:'DM Mono',ui-monospace,monospace;font-size:14px;padding:8px 10px;border-radius:6px;border:1px solid var(--border-hi);background:var(--bg);color:var(--text);}
  .settings button{width:100%;font-family:'DM Mono',ui-monospace,monospace;font-size:12px;font-weight:700;padding:8px;border-radius:6px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;}

  .back-link{display:block;text-align:center;font-size:12px;color:var(--accent-text2);margin-top:1.5rem;text-decoration:none;}
  .note{font-size:11px;color:var(--text3);text-align:center;margin-top:1rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <div>
      <h1>ポモドーロタイマー</h1>
      <p class="subtitle">スマホ版（このブラウザに記録されます）</p>
    </div>
    <button id="themeToggle">🌙</button>
  </div>

  <div class="card">
    <div class="mode-label" id="modeLabel">作業中</div>
    <div class="time-display" id="timeDisplay">25:00</div>
    <button class="switch-btn" id="switchBtn">⇄ 休憩に切り替える</button>
    <div class="btn-row">
      <button class="btn-start" id="startBtn">開始</button>
      <button class="btn-pause" id="pauseBtn">一時停止</button>
      <button class="btn-reset" id="resetBtn">リセット</button>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-row"><span>今日の実績（このブラウザ）</span><b id="todayTotal">0h00m</b></div>
    <div class="stat-row"><span>累計作業時間</span><b id="grandTotal">0h00m</b></div>
    <button class="settings button" id="clearBtn" style="margin-top:8px;background:transparent;border:1px solid var(--border-hi);color:var(--text3);">累計をリセット</button>
  </div>

  <div class="settings">
    <div class="row">
      <div style="flex:1"><label>作業(分)</label><input type="number" id="workMin" value="25" min="1"></div>
      <div style="flex:1"><label>休憩(分)</label><input type="number" id="breakMin" value="5" min="1"></div>
    </div>
    <button id="applySettings">設定を反映</button>
  </div>

  <a class="back-link" href="calendar.html">← 学習計画カレンダーに戻る</a>
  <p class="note">画面を開いたままにしないと記録が進みません（バックグラウンドでは止まる場合があります）。この記録はこの端末のブラウザだけに保存され、PC側のポモドーロアプリとは別集計です。</p>
</div>

<script>
const DAILY_KEY = 'phoneTimerDaily_v1';
const TOTAL_KEY = 'phoneTimerTotal_v1';
const SETTINGS_KEY = 'phoneTimerSettings_v1';
const THEME_KEY = 'studyCalendarTheme';

let workMinutes = 25;
let breakMinutes = 5;
let isWorkMode = true;
let remainingSeconds = workMinutes * 60;
let isRunning = false;
let intervalId = null;

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function loadDaily(){ try{ return JSON.parse(localStorage.getItem(DAILY_KEY)) || {}; }catch(e){ return {}; } }
function saveDaily(obj){ localStorage.setItem(DAILY_KEY, JSON.stringify(obj)); }
function loadTotal(){ return parseInt(localStorage.getItem(TOTAL_KEY) || '0', 10); }
function saveTotal(v){ localStorage.setItem(TOTAL_KEY, String(v)); }
function loadSettings(){
  try{
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if(s){ workMinutes = s.workMinutes || 25; breakMinutes = s.breakMinutes || 5; }
  }catch(e){}
}
function saveSettings(){
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({workMinutes, breakMinutes}));
}

function formatMMSS(seconds){
  const sign = seconds < 0 ? '-' : '';
  seconds = Math.abs(seconds);
  const m = Math.floor(seconds/60), s = seconds%60;
  return sign + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function formatHM(totalSeconds){
  totalSeconds = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(totalSeconds/3600), m = Math.floor((totalSeconds%3600)/60);
  return h+'h'+String(m).padStart(2,'0')+'m';
}

function updateDisplay(){
  const timeEl = document.getElementById('timeDisplay');
  timeEl.textContent = formatMMSS(remainingSeconds);
  timeEl.classList.toggle('break', !isWorkMode);
  document.getElementById('modeLabel').textContent = isWorkMode ? '作業中' : '休憩中';
  document.getElementById('switchBtn').textContent = isWorkMode ? '⇄ 休憩に切り替える' : '⇄ 作業に切り替える';

  const daily = loadDaily();
  document.getElementById('todayTotal').textContent = formatHM(daily[todayStr()] || 0);
  document.getElementById('grandTotal').textContent = formatHM(loadTotal());
}

function tick(){
  remainingSeconds -= 1;
  if(isWorkMode){
    const daily = loadDaily();
    const today = todayStr();
    daily[today] = (daily[today] || 0) + 1;
    saveDaily(daily);
    saveTotal(loadTotal() + 1);
  }
  if(!isWorkMode && remainingSeconds === -1){
    try{ new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=').play(); }catch(e){}
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
  }
  updateDisplay();
}

document.getElementById('startBtn').addEventListener('click', ()=>{
  if(isRunning) return;
  isRunning = true;
  intervalId = setInterval(tick, 1000);
});
document.getElementById('pauseBtn').addEventListener('click', ()=>{
  isRunning = false;
  clearInterval(intervalId);
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  isRunning = false;
  clearInterval(intervalId);
  remainingSeconds = (isWorkMode ? workMinutes : breakMinutes) * 60;
  updateDisplay();
});
document.getElementById('switchBtn').addEventListener('click', ()=>{
  isWorkMode = !isWorkMode;
  remainingSeconds = (isWorkMode ? workMinutes : breakMinutes) * 60;
  updateDisplay();
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(confirm('累計時間をリセットしますか？（今日以前の日別記録は残ります）')){
    saveTotal(0);
    updateDisplay();
  }
});
document.getElementById('applySettings').addEventListener('click', ()=>{
  const w = parseInt(document.getElementById('workMin').value, 10);
  const b = parseInt(document.getElementById('breakMin').value, 10);
  if(w > 0 && b > 0){
    workMinutes = w; breakMinutes = b;
    saveSettings();
    if(!isRunning){
      remainingSeconds = (isWorkMode ? workMinutes : breakMinutes) * 60;
      updateDisplay();
    }
    alert('設定を反映しました');
  } else {
    alert('数字を入力してください');
  }
});

const themeBtn = document.getElementById('themeToggle');
function applyTheme(t){
  document.body.classList.toggle('dark', t === 'dark');
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
}
themeBtn.addEventListener('click', ()=>{
  const next = document.body.classList.contains('dark') ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
});
applyTheme(localStorage.getItem(THEME_KEY) || 'light');

loadSettings();
document.getElementById('workMin').value = workMinutes;
document.getElementById('breakMin').value = breakMinutes;
remainingSeconds = workMinutes * 60;
updateDisplay();
</script>
</body>
</html>
